version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: bookdb
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d bookdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
